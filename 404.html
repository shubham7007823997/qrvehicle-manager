<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vehicle QR Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // pathSegmentsToKeep = 1 means keep /qrvehicle-manager in the path
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
