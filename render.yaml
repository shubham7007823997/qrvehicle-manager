services:
  - type: web
    name: qrvehicle-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qrvehicle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: FRONTEND_URL
        value: https://shubham7007823997.github.io
      - key: BASE_URL
        value: https://shubham7007823997.github.io/qrvehicle-manager
    healthCheckPath: /health
    plan: free

databases:
  - name: qrvehicle-db
    databaseName: qrvehicle
    user: qrvehicle_user
    plan: free
