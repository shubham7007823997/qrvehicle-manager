<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=yes" />
    <meta name="description" content="Scan QR code to view vehicle and driver information instantly — no app required." />
    <meta property="og:title" content="Vehicle QR Manager" />
    <meta property="og:description" content="Scan QR code to view vehicle and driver information." />
    <meta property="og:type" content="website" />
    <title>Vehicle QR Manager</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect handler
      // Reads the path stored by 404.html and replaces the URL
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif;">
        <h2>JavaScript Required</h2>
        <p>Please enable JavaScript to view vehicle details.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
