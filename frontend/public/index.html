<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=yes" />
    <meta name="description" content="Scan QR code to view vehicle and driver information instantly." />
    <meta property="og:title" content="Vehicle QR Manager" />
    <meta property="og:description" content="Scan QR code to view vehicle and driver information." />
    <meta property="og:type" content="website" />
    <title>Vehicle QR Manager</title>
    <script>
      // Single Page Apps for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // Restores the path that was saved by 404.html
      (function(l) {
        if (l.search.indexOf('?p=/') > -1) {
          var r = l.search.slice(1).split('&');
          var path = '';
          var query = '';
          r.forEach(function(part) {
            if (part.startsWith('p=')) path = part.slice(2).replace(/~and~/g, '&');
            if (part.startsWith('q=')) query = '?' + part.slice(2).replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.split('/').slice(0, 2).join('/') + '/' + path + query + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif;">
        <h2>JavaScript Required</h2>
        <p>Please enable JavaScript to view vehicle details.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
