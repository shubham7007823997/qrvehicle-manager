<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Mobile viewport — prevents zoom, ensures full-width on all phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=yes" />

    <meta name="description" content="Scan QR code to view vehicle and driver information instantly — no app required." />

    <!-- Open Graph — shows a nice preview when link is shared -->
    <meta property="og:title" content="Vehicle QR Manager" />
    <meta property="og:description" content="Scan QR code to view vehicle and driver information." />
    <meta property="og:type" content="website" />

    <title>Vehicle QR Manager</title>
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif;">
        <h2>JavaScript Required</h2>
        <p>Please enable JavaScript to view vehicle details.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
